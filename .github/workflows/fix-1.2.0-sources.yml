name: Fix 1.2.0 sources

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/1.2.0-platform
      - name: Fix raw string delimiters
        run: |
          python - <<'PY'
          from pathlib import Path
          replacements = {
              "native/src/frontend_main.cpp": [
                  ('const std::regex mode(R"("rememberedControlMode"\\s*:\\s*"([^"]+)")");',
                   'const std::regex mode(R"AW("rememberedControlMode"\\s*:\\s*"([^"]+)")AW");')
              ],
              "native/src/platform_features.cpp": [
                  ('R"(\\{\\s*"name"\\s*:\\s*"([A-Za-z0-9_-]+)"\\s*,\\s*"cpu"\\s*:\\s*([0-9]{1,3})\\s*,\\s*"gpu"\\s*:\\s*([0-9]{1,3})\\s*\\})"',
                   'R"AW(\\{\\s*"name"\\s*:\\s*"([A-Za-z0-9_-]+)"\\s*,\\s*"cpu"\\s*:\\s*([0-9]{1,3})\\s*,\\s*"gpu"\\s*:\\s*([0-9]{1,3})\\s*\\})AW"')
              ]
          }
          for filename, items in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in items:
                  if old not in text:
                      raise SystemExit(f"Expected source text missing in {filename}")
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")
          PY
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/frontend_main.cpp native/src/platform_features.cpp
          git commit -m "Fix awfan 1.2.0 source parsing"
          git push origin HEAD:release/1.2.0-platform
