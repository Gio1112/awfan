name: Finalize 1.2.0 updater

on:
  push:
    branches:
      - release/1.2.0-platform
    paths:
      - .github/workflows/finalize-1.2.0-updater.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/1.2.0-platform
      - name: Add transactional update flow
        shell: pwsh
        run: |
          $path = "native/package/update.ps1"
          $text = Get-Content -LiteralPath $path -Raw

          $helper = @'
          function Invoke-IsolatedScript {
              param(
                  [Parameter(Mandatory)][string]$Script,
                  [Parameter(Mandatory)][string[]]$Arguments
              )

              $powershell = "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe"
              $command = @("-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "`"$Script`"")
              $command += $Arguments
              $process = Start-Process `
                  -FilePath $powershell `
                  -ArgumentList ($command -join " ") `
                  -Wait `
                  -PassThru
              return $process.ExitCode
          }

          '@

          if ($text -notmatch 'function Invoke-IsolatedScript') {
              $anchor = '$currentVersion = Get-InstalledVersion'
              if (-not $text.Contains($anchor)) { throw "Updater helper anchor missing." }
              $text = $text.Replace($anchor, $helper + $anchor)
          }

          if ($text -notmatch '\$backupPath') {
              $text = $text.Replace(
                  '$extractPath = Join-Path $tempRoot "extracted"',
                  '$extractPath = Join-Path $tempRoot "extracted"' + "`r`n" +
                  '$backupPath = Join-Path $tempRoot "rollback"'
              )
          }

          $old = @'
              Write-Host "Installing awfan $latestVersion..."
              & $installer.FullName -InstallDir $InstallDir

              Write-Host "Updated awfan to $latestVersion."
          '@

          $new = @'
              $transaction = Join-Path $installer.DirectoryName "update-transaction.ps1"
              if (-not (Test-Path -LiteralPath $transaction -PathType Leaf)) {
                  throw "The downloaded package does not contain update-transaction.ps1."
              }

              & $transaction -Action Backup -InstallDir $InstallDir -BackupDir $backupPath

              try {
                  Write-Host "Installing awfan $latestVersion..."
                  $installCode = Invoke-IsolatedScript `
                      -Script $installer.FullName `
                      -Arguments @("-InstallDir", "`"$InstallDir`"")
                  if ($installCode -ne 0) {
                      throw "The installer exited with code $installCode."
                  }

                  Write-Host "Running post-update health checks..."
                  & $transaction `
                      -Action Health `
                      -InstallDir $InstallDir `
                      -BackupDir $backupPath `
                      -ExpectedVersion $latestVersion

                  Write-Host "Updated awfan to $latestVersion."
              }
              catch {
                  $failure = $_
                  Write-Warning "Update failed. Restoring awfan $currentVersion..."
                  $restoreCode = Invoke-IsolatedScript `
                      -Script $transaction `
                      -Arguments @(
                          "-Action", "Restore",
                          "-InstallDir", "`"$InstallDir`"",
                          "-BackupDir", "`"$backupPath`""
                      )
                  if ($restoreCode -ne 0) {
                      throw "Update failed and rollback also failed. $failure"
                  }
                  throw "Update failed and awfan was rolled back to $currentVersion. $failure"
              }
          '@

          if (-not $text.Contains($old.Trim())) {
              throw "Updater installation block missing."
          }
          $text = $text.Replace($old.Trim(), $new.Trim())
          Set-Content -LiteralPath $path -Value $text -Encoding utf8

      - name: Commit updater transaction
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/package/update.ps1
          git commit -m "Add transactional updater rollback"
          git push origin HEAD:release/1.2.0-platform
