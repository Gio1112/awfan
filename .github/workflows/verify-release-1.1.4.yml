name: Finish awfan 1.1.4 verification

on:
  push:
    paths:
      - .github/workflows/verify-release-1.1.4.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove verification branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: 'heads/verify/release-1.1.4'
              });
              core.info('Removed verification branch.');
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.info('Verification branch is already absent.');
                return;
              }
              throw error;
            }
