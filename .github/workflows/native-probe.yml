name: Windows build

on:
  push:
    branches:
      - main
    paths:
      - native/**
      - .github/workflows/native-probe.yml
  pull_request:
    paths:
      - native/**
      - .github/workflows/native-probe.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S native -B build/native -A x64

      - name: Build
        shell: pwsh
        run: |
          cmake --build build/native --config Release --parallel 2>&1 |
            Tee-Object -FilePath native-build.log
          exit $LASTEXITCODE

      - name: Smoke test
        shell: pwsh
        run: |
          $exe = ".\build\native\Release\awfan.exe"
          $version = (& $exe version | Out-String).Trim()
          if ($version -ne "awfan 1.0.1") {
            throw "Unexpected version output: $version"
          }

          $help = (& $exe help | Out-String)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($help -notmatch "awfan update --check") {
            throw "Updater commands are missing from help output."
          }

          & $exe state --json | ConvertFrom-Json | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package ZIP
        shell: pwsh
        run: cmake --build build/native --config Release --target package

      - name: Verify package, installer and checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem ".\build\native" -Filter "awfan-*-windows-x64.zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $zip) { throw "The CPack ZIP was not created." }

          $extract = ".\build\native\package-smoke"
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extract -Force

          $packageRoot = Get-ChildItem -LiteralPath $extract -Directory | Select-Object -First 1
          if (-not $packageRoot) { throw "Package root directory was not found." }

          $required = @(
            "awfan.exe",
            "install.ps1",
            "update.ps1",
            "uninstall.ps1",
            "awfan-completion.ps1",
            "README.txt",
            "CHANGELOG.txt",
            "THIRD-PARTY-NOTICES.txt",
            "LICENSE.txt"
          )

          foreach ($file in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path $packageRoot.FullName $file))) {
              throw "Package is missing $file"
            }
          }

          & (Join-Path $packageRoot.FullName "awfan.exe") version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          . (Join-Path $packageRoot.FullName "awfan-completion.ps1")

          $installDir = Join-Path $env:RUNNER_TEMP "awfan-install-smoke"
          & (Join-Path $packageRoot.FullName "install.ps1") -InstallDir $installDir -NoPath
          & (Join-Path $installDir "awfan.exe") version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          foreach ($file in @("LICENSE.txt", "update.ps1")) {
            if (-not (Test-Path -LiteralPath (Join-Path $installDir $file))) {
              throw "The installed files are missing $file"
            }
          }

          & (Join-Path $packageRoot.FullName "uninstall.ps1") -InstallDir $installDir -KeepState
          if (Test-Path -LiteralPath $installDir) {
            throw "The temporary installation directory still exists after uninstall."
          }

          $checksum = [System.IO.Path]::ChangeExtension($zip.FullName, ".sha256")
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $zip.FullName
          "$($hash.Hash.ToLower())  $($zip.Name)" |
            Set-Content -Encoding ascii $checksum

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: awfan-windows-x64
          path: build/native/Release/awfan.exe
          if-no-files-found: error

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: awfan-windows-x64-package
          path: |
            build/native/awfan-*-windows-x64.zip
            build/native/awfan-*-windows-x64.sha256
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: awfan-native-build-log
          path: native-build.log
          if-no-files-found: warn
