name: Native CLI

on:
  push:
    branches:
      - codex/native-backend-probe
    paths:
      - native/**
      - .github/workflows/native-probe.yml
  pull_request:
    paths:
      - native/**
      - .github/workflows/native-probe.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S native -B build/native -A x64

      - name: Build
        shell: pwsh
        run: |
          cmake --build build/native --config Release --parallel 2>&1 |
            Tee-Object -FilePath native-build.log
          exit $LASTEXITCODE

      - name: Smoke test
        shell: pwsh
        run: |
          $exe = ".\build\native\Release\awfan.exe"
          & $exe version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe help | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe state --json | ConvertFrom-Json | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package ZIP
        shell: pwsh
        run: cmake --build build/native --config Release --target package

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: awfan-windows-x64
          path: build/native/Release/awfan.exe
          if-no-files-found: error

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: awfan-1.0.0-rc1-windows-x64
          path: build/native/awfan-1.0.0-rc1-windows-x64.zip
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: awfan-native-build-log
          path: native-build.log
          if-no-files-found: warn
