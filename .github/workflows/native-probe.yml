name: Windows build

on:
  push:
    branches:
      - main
    paths:
      - native/**
      - .github/workflows/native-probe.yml
  pull_request:
    paths:
      - native/**
      - .github/workflows/native-probe.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S native -B build/native -A x64

      - name: Build
        shell: pwsh
        run: |
          cmake --build build/native --config Release --parallel 2>&1 |
            Tee-Object -FilePath native-build.log
          exit $LASTEXITCODE

      - name: Smoke test
        shell: pwsh
        run: |
          $root = ".\build\native\Release"
          $exe = Join-Path $root "awfan.exe"
          $broker = Join-Path $root "awfan-broker.exe"

          $version = (& $exe version | Out-String).Trim()
          if ($version -ne "awfan 1.1.3") {
            throw "Unexpected version output: $version"
          }

          $help = (& $exe help | Out-String)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($help -notmatch "awfan broker-status") {
            throw "Broker commands are missing from help output."
          }
          if ($help -notmatch "awfan update --check") {
            throw "Updater commands are missing from help output."
          }

          foreach ($alias in @(
            "balanced",
            "balanced-performance",
            "balancedperformance",
            "cool",
            "quiet",
            "performance"
          )) {
            $aliasOutput = (& $exe $alias --invalid 2>&1 | Out-String)
            if ($LASTEXITCODE -eq 0 -or
                $aliasOutput -notmatch "Profile aliases accept only") {
              throw "Named alias '$alias' was not parsed by the frontend."
            }
          }

          & $exe state --json | ConvertFrom-Json | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $brokerTest = Start-Process `
            -FilePath $broker `
            -ArgumentList "--self-test" `
            -Wait `
            -PassThru
          if ($brokerTest.ExitCode -ne 0) {
            throw "Broker self-test failed with exit code $($brokerTest.ExitCode)."
          }

          $updater = Get-Content ".\native\package\update.ps1" -Raw
          if ($updater -match '\bGet-FileHash\b') {
            throw "The updater must not depend on Get-FileHash."
          }
          if ($updater -notmatch 'System\.Security\.Cryptography\.SHA256') {
            throw "The updater is missing the .NET SHA-256 implementation."
          }

      - name: Package ZIP
        shell: pwsh
        run: cmake --build build/native --config Release --target package

      - name: Verify package, migration, repair and checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem ".\build\native" -Filter "awfan-*-windows-x64.zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $zip) { throw "The CPack ZIP was not created." }

          $extract = ".\build\native\package-smoke"
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extract -Force

          $packageRoot = Get-ChildItem -LiteralPath $extract -Directory | Select-Object -First 1
          if (-not $packageRoot) { throw "Package root directory was not found." }

          $required = @(
            "awfan.exe",
            "awfan-core.exe",
            "awfan-broker.exe",
            "install.ps1",
            "update.ps1",
            "uninstall.ps1",
            "awfan-completion.ps1",
            "README.txt",
            "CHANGELOG.txt",
            "THIRD-PARTY-NOTICES.txt",
            "LICENSE.txt"
          )

          foreach ($file in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path $packageRoot.FullName $file))) {
              throw "Package is missing $file"
            }
          }

          & (Join-Path $packageRoot.FullName "awfan.exe") version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          . (Join-Path $packageRoot.FullName "awfan-completion.ps1")

          $installDir = Join-Path $env:RUNNER_TEMP "awfan-install-smoke"
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          $legacyFiles = @(
            "awfan.ps1",
            "awfan.cmd",
            "awfan-broker.ps1",
            "awfan-updater.ps1",
            "VERSION"
          )

          foreach ($file in $legacyFiles) {
            Set-Content -LiteralPath (Join-Path $installDir $file) -Value "legacy"
          }

          & (Join-Path $packageRoot.FullName "install.ps1") `
            -InstallDir $installDir `
            -NoPath `
            -NoBroker

          foreach ($file in $legacyFiles) {
            if (Test-Path -LiteralPath (Join-Path $installDir $file)) {
              throw "Legacy migration did not remove $file"
            }
          }

          foreach ($file in @(
            "awfan.exe",
            "awfan-core.exe",
            "awfan-broker.exe",
            "install.ps1",
            "update.ps1",
            "uninstall.ps1",
            "LICENSE.txt"
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $installDir $file))) {
              throw "The installed files are missing $file"
            }
          }

          & (Join-Path $installDir "awfan.exe") version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & (Join-Path $installDir "awfan.exe") state --json |
            ConvertFrom-Json | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & (Join-Path $installDir "install.ps1") `
            -InstallDir $installDir `
            -NoPath `
            -NoBroker
          if ($LASTEXITCODE -ne 0) {
            throw "In-place repair installation failed."
          }

          & (Join-Path $installDir "awfan.exe") version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & (Join-Path $installDir "uninstall.ps1") `
            -InstallDir $installDir `
            -KeepState `
            -NoBroker

          if (Test-Path -LiteralPath $installDir) {
            throw "The temporary installation directory still exists after uninstall."
          }

          $checksum = [System.IO.Path]::ChangeExtension($zip.FullName, ".sha256")
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $zip.FullName
          "$($hash.Hash.ToLower())  $($zip.Name)" |
            Set-Content -Encoding ascii $checksum

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: awfan-windows-x64
          path: |
            build/native/Release/awfan.exe
            build/native/Release/awfan-core.exe
            build/native/Release/awfan-broker.exe
          if-no-files-found: error

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: awfan-windows-x64-package
          path: |
            build/native/awfan-*-windows-x64.zip
            build/native/awfan-*-windows-x64.sha256
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: awfan-native-build-log
          path: native-build.log
          if-no-files-found: warn
