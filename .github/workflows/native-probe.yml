name: Native CLI

on:
  push:
    branches:
      - codex/native-backend-probe
    paths:
      - native/**
      - .github/workflows/native-probe.yml
  pull_request:
    paths:
      - native/**
      - .github/workflows/native-probe.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S native -B build/native -A x64

      - name: Build
        shell: pwsh
        run: |
          cmake --build build/native --config Release --parallel 2>&1 |
            Tee-Object -FilePath native-build.log
          exit $LASTEXITCODE

      - name: Smoke test
        shell: pwsh
        run: |
          $exe = ".\build\native\Release\awfan.exe"
          & $exe version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe help | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe state --json | ConvertFrom-Json | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package ZIP
        shell: pwsh
        run: cmake --build build/native --config Release --target package

      - name: Verify package and checksum
        shell: pwsh
        run: |
          $zip = Get-Item ".\build\native\awfan-1.0.0-rc1-windows-x64.zip"
          $extract = ".\build\native\package-smoke"
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extract -Force

          $packageRoot = Get-ChildItem -LiteralPath $extract -Directory | Select-Object -First 1
          if (-not $packageRoot) { throw "Package root directory was not found." }

          $required = @(
            "awfan.exe",
            "install.ps1",
            "uninstall.ps1",
            "awfan-completion.ps1",
            "README.txt",
            "CHANGELOG.txt",
            "THIRD-PARTY-NOTICES.txt"
          )

          foreach ($file in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path $packageRoot.FullName $file))) {
              throw "Package is missing $file"
            }
          }

          & (Join-Path $packageRoot.FullName "awfan.exe") version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $zip.FullName
          "$($hash.Hash.ToLower())  $($zip.Name)" |
            Set-Content -Encoding ascii ".\build\native\awfan-1.0.0-rc1-windows-x64.sha256"

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: awfan-windows-x64
          path: build/native/Release/awfan.exe
          if-no-files-found: error

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: awfan-1.0.0-rc1-windows-x64
          path: |
            build/native/awfan-1.0.0-rc1-windows-x64.zip
            build/native/awfan-1.0.0-rc1-windows-x64.sha256
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: awfan-native-build-log
          path: native-build.log
          if-no-files-found: warn
