name: Cleanup merged branches

on:
  push:
    paths:
      - .github/workflows/cleanup-merged-branches.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged pull request branches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const defaultBranch = context.payload.repository.default_branch;
            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            const deleted = [];
            const skipped = [];

            for (const branch of branches) {
              if (branch.name === defaultBranch) {
                continue;
              }

              const pulls = await github.paginate(
                github.rest.pulls.list,
                {
                  owner,
                  repo,
                  state: 'all',
                  head: `${owner}:${branch.name}`,
                  per_page: 100
                }
              );

              if (pulls.some((pull) => pull.state === 'open')) {
                skipped.push(`${branch.name} (open pull request)`);
                continue;
              }

              if (!pulls.some((pull) => pull.merged_at)) {
                skipped.push(`${branch.name} (not associated with a merged pull request)`);
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`
                });
                deleted.push(branch.name);
              } catch (error) {
                core.warning(`Could not delete ${branch.name}: ${error.message}`);
                skipped.push(`${branch.name} (delete failed)`);
              }
            }

            core.summary
              .addHeading('Merged branch cleanup')
              .addRaw(`Deleted: ${deleted.length ? deleted.join(', ') : 'none'}\n`)
              .addRaw(`Skipped: ${skipped.length ? skipped.join(', ') : 'none'}\n`)
              .write();

            core.info(`Deleted branches: ${deleted.length ? deleted.join(', ') : 'none'}`);
            core.info(`Skipped branches: ${skipped.length ? skipped.join(', ') : 'none'}`);
