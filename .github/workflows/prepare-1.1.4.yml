name: Cleanup awfan 1.1.4 release branch

on:
  push:
    paths:
      - .github/workflows/prepare-1.1.4.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged release branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'release/1.1.4-hotfix';
            const pulls = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'closed',
                head: `${owner}:${branch}`,
                per_page: 100
              }
            );

            if (!pulls.some((pull) => pull.merged_at)) {
              core.setFailed(`Branch ${branch} is not associated with a merged pull request.`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`
              });
              core.info(`Deleted ${branch}`);
            } catch (error) {
              if (error.status === 422 || error.status === 404) {
                core.info(`${branch} is already absent.`);
                return;
              }
              throw error;
            }
