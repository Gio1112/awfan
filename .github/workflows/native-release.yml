name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag, for example v1.1.4
        required: true
        default: v1.1.4
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || startsWith(github.event.head_commit.message, 'Release awfan ')
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } else {
            $versionFile = (Get-Content -LiteralPath ".\VERSION" -Raw).Trim()
            $tag = "v$versionFile"
          }

          if ($tag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Release tag '$tag' is not a supported semantic version tag."
          }

          $version = $tag -replace '^v', ''
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Configure
        run: cmake -S native -B build/native -A x64

      - name: Build
        run: cmake --build build/native --config Release --parallel

      - name: Smoke test and verify version
        shell: pwsh
        run: |
          $root = ".\build\native\Release"
          $exe = Join-Path $root "awfan.exe"
          $core = Join-Path $root "awfan-core.exe"
          $broker = Join-Path $root "awfan-broker.exe"
          $expected = "awfan ${{ steps.version.outputs.version }}"
          $frontendVersion = (& $exe version | Out-String).Trim()
          $coreVersion = (& $core version | Out-String).Trim()

          if ($frontendVersion -ne $expected) {
            throw "Frontend version '$frontendVersion' does not match tag '$expected'."
          }
          if ($coreVersion -ne $expected) {
            throw "Core version '$coreVersion' does not match tag '$expected'."
          }

          & $exe help | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe state --json | ConvertFrom-Json | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $brokerTest = Start-Process `
            -FilePath $broker `
            -ArgumentList "--self-test" `
            -Wait `
            -PassThru
          if ($brokerTest.ExitCode -ne 0) {
            throw "Broker self-test failed with exit code $($brokerTest.ExitCode)."
          }

      - name: Create package
        run: cmake --build build/native --config Release --target package

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem ".\build\native" -Filter "awfan-*-windows-x64.zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $zip) { throw "The release ZIP was not created." }

          $checksum = [System.IO.Path]::ChangeExtension($zip.FullName, ".sha256")
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $zip.FullName
          "$($hash.Hash.ToLower())  $($zip.Name)" |
            Set-Content -Encoding ascii $checksum

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: awfan ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            build/native/awfan-*-windows-x64.zip
            build/native/awfan-*-windows-x64.sha256
