name: Source snapshot

on:
  push:
    branches:
      - release/1.2.0-platform

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: awfan-1.2.0-source-snapshot
          path: |
            native/src/frontend_main.cpp
            native/src/platform_features.cpp
            native/src/broker.cpp
            native/package/update.ps1
            native/package/install.ps1
            install.ps1
            native/CMakeLists.txt
            .github/workflows/native-probe.yml
          if-no-files-found: error
